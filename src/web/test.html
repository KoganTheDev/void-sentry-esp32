    <title>Void Sentry</title>
    <style>
        :root {
            /* Colors */
            --bg: #0a0a0a;
            --panel: #161616;
            --accent: #ff6b00;
            --text: #e0e0e0;
            --terminal: #00ff41;
            --error: #ff3e3e;
            --border: #333;

            /* Spacing & Effects */
            --radius: 4px;
            --pad-sm: 8px;
            --pad-md: 15px;
            --gap-main: 10px;
            --glow: 0 0 10px rgba(255, 107, 0, 0.3);
        }

        /* --- Reset & Base --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header Section --- */
        .header-brand {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(90deg, #1a1a1a, #0a0a0a);
            border-bottom: 1px solid var(--accent);
            box-shadow: var(--glow);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            margin: 0;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        /* NOTE: logo-icon is temporary, will be replaced with a pixel art logo instead :) */ 
        .logo-icon {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            position: relative;
            /* Anchor for both ring and dot */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Spinning Ring */
        .logo-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            /* fills the container */
            border: 3px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 2s linear infinite;
        }

        /* The Static Center Dot */
        .logo-icon::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            /* No animation applied here */
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        .header-actions button {
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            padding: 4px;
            transition: transform 0.2s;
        }

        .header-actions button:hover {
            opacity: 0.8;
        }

        .header-actions svg {
            fill: var(--accent);
            width: 100%;
            height: 100%;
        }

        /* --- Dashboard Layout --- */
        .dashboard {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 280px;
            grid-template-rows: 1fr auto;
            gap: var(--gap-main);
            padding: var(--gap-main);
            min-height: 0;
            /* Important for flex-child scrolling */
        }

        /* --- Video Box & Canvas --- */
        .video-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
            display: grid;
            place-items: center;
        }

        #streamImg {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* --- UI Panels (Stats & Advanced) --- */
        .ui-panel,
        .stats-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--pad-md);
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: var(--pad-sm);
        }

        .stats-panel h3 {
            margin: 0;
            color: var(--accent);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .stat-val {
            color: var(--terminal);
        }

        .advanced-stats {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
        }

        .advanced-stats summary {
            cursor: pointer;
            padding: 4px 0;
            outline: none;
        }

        .toggle-btn {
            margin-top: auto;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .toggle-btn:hover {
            background: rgba(255, 107, 0, 0.1);
        }

        .toggle-btn:active {
            background: var(--accent);
            color: #fff;
        }

        /* --- Control Panel (D-Pad & Fire) --- */
        .control-panel {
            grid-column: 1 / -1;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: clamp(15px, 3vw, 25px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(20px, 8vw, 80px);
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 8px;
        }

        .btn {
            background: #252525;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .btn svg {
            width: 20px;
            fill: #fff;
            opacity: 0.8;
        }

        .btn.active,
        .btn:active {
            background: var(--accent);
        }

        /* Assign D-Pad areas */
        .up {
            grid-area: 1 / 2;
        }

        .left {
            grid-area: 2 / 1;
        }

        .right {
            grid-area: 2 / 3;
        }

        .down {
            grid-area: 3 / 2;
        }

        .fire-btn {
            flex: 1;
            max-width: 400px;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, #ff4500, #b00);
            border: none;
            border-radius: var(--radius);
            box-shadow: 0 4px 0 #600;
            cursor: pointer;
        }

        .fire-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #600;
        }

        /* --- Help Overlay --- */
        .help-overlay {
            display: none;
            position: fixed;
            top: 80px;
            right: 20px;
            width: 300px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--terminal);
            padding: 20px;
            z-index: 1000;
            backdrop-filter: blur(8px);
            border-radius: var(--radius);
        }

        .help-content h2 {
            color: var(--terminal);
            font-size: 0.9rem;
            font-family: 'Orbitron', sans-serif;
            margin-top: 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .close-help,
        kbd {
            background: var(--terminal);
            color: #000;
            padding: 2px 5px;
            border-radius: 2px;
            font-weight: bold;
        }


        /* --- Mobile Responsiveness --- */
        @media (max-width: 800px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                overflow-y: auto;
            }

            .stats-panel {
                order: 2;
            }

            .video-box {
                order: 1;
                height: 300px;
            }

            .control-panel {
                order: 3;
                flex-direction: column;
                gap: 20px;
            }

            .fire-btn {
                width: 100%;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>

    <script>
        const App = {
            state: {
                socket: null,
                mode: 'AI',
                activeKeys: new Set(),
                latestData: null
            },

            init() {
                this.canvas = document.getElementById('overlayCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.img = document.getElementById('streamImg');
                this.img.onload = () => this.resize();
                window.onresize = () => this.resize();

                this.elements = {
                    pos: document.getElementById('metric-pos'),
                    fps: document.getElementById('metric-fps'),
                    lock: document.getElementById('metric-lock'),
                    mode: document.getElementById('metric-mode'),
                    fireBtn: document.querySelector('.fire-btn'),
                    toggleBtn: document.querySelector('.toggle-btn')
                };

                this.setupControls();
                this.setupKeyboard();
                this.connect();
                this.renderLoop();
            },

            toggleFullScreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            },

            toggleHelp() {
                const modal = document.getElementById('helpModal');
                if (modal.style.display === 'none' || modal.style.display === '') {
                    modal.style.display = 'flex';
                } else {
                    modal.style.display = 'none';
                }
            },

            setupKeyboard() {
                const keyMap = {
                    'w': 'up', 'ArrowUp': 'up',
                    'a': 'left', 'ArrowLeft': 'left',
                    's': 'down', 'ArrowDown': 'down',
                    'd': 'right', 'ArrowRight': 'right'
                };

                window.addEventListener('keydown', (e) => {
                    if (e.repeat) return;

                    if (e.key === '?') { // Toggle Help legend
                        this.toggleHelp();
                        return;
                    }
                    if (e.key === 'Escape') { // Close Help legend
                        document.getElementById('helpModal').style.display = 'none';
                        return;
                    }

                    if (e.key.toLowerCase() === 'f') { // Toggle Full screen
                        this.toggleFullScreen();
                        return;
                    }
                    if (e.key.toLowerCase() === 'm') { // Toggle AI\Manual modes
                        this.toggleMode();
                        return;
                    }



                    // Existing Movement Controls
                    if (keyMap[e.key]) {
                        const dir = keyMap[e.key];
                        this.state.activeKeys.add(e.key);
                        this.send(`move:${dir}`);
                        const btn = document.querySelector(`.${dir}`);
                        if (btn) btn.classList.add('active');
                    }

                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.fire(true);
                        document.querySelector('.fire-btn').style.transform = "translateY(2px)";
                    }
                });

                window.addEventListener('keyup', (e) => {
                    if (keyMap[e.key]) {
                        const dir = keyMap[e.key];
                        this.state.activeKeys.delete(e.key);

                        const btn = document.querySelector(`.${dir}`);
                        if (btn) btn.classList.remove('active');

                        if (this.state.activeKeys.size === 0) {
                            this.send(`move:stop`);
                        }
                    }
                    if (e.code === 'Space') {
                        this.fire(false);
                        document.querySelector('.fire-btn').style.transform = "none";
                    }
                });
            },

            resize() {
                // This ensures the drawing layer matches the actual visible image size
                const rect = this.img.getBoundingClientRect();
                this.canvas.style.width = this.img.clientWidth + 'px';
                this.canvas.style.height = this.img.clientHeight + 'px';
                this.canvas.width = this.img.clientWidth;
                this.canvas.height = this.img.clientHeight;
            },

            connect() {
                const url = `ws://${location.host}/ws`;
                this.state.socket = new WebSocket(url);
                this.state.socket.onopen = () => this.updateStatus("ONLINE", "#00ff41");
                this.state.socket.onclose = () => {
                    this.updateStatus("RETRYING", "orange");
                    setTimeout(() => this.connect(), 2000);
                };
                this.state.socket.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        this.handleData(data);
                    } catch (err) { }
                };
            },

            updateStatus(txt, clr) {
                const el = document.getElementById('metric-sys');
                if (el) { el.textContent = txt; el.style.color = clr; }
            },

            handleData(data) {
                this.state.latestData = data;
                this.elements.pos.textContent = `${data.x},${data.y}`;
                this.elements.fps.textContent = data.fps
                const lockEl = document.getElementById('metric-lock');
                lockEl.textContent = data.lock ? "LOCKED" : "CLEAR";
                lockEl.style.color = data.lock ? "var(--error)" : "var(--terminal)";
                this.draw(data);
            },

            send(msg) {
                if (this.state.socket?.readyState === 1) this.state.socket.send(msg);
            },

            setupControls() {
                document.querySelectorAll('.btn').forEach(b => {
                    const d = b.dataset.dir;
                    b.onmousedown = b.ontouchstart = (e) => {
                        e.preventDefault();
                        this.send(`move:${d}`);
                        b.classList.add('active');
                    };
                    b.onmouseup = b.ontouchend = () => {
                        this.send(`move:stop`);
                        b.classList.remove('active');
                    };
                });
            },

            fire(on) {
                this.send(on ? "fire:on" : "fire:off");
            },

            toggleMode() {
                this.state.mode = this.state.mode === 'MANUAL' ? 'AI' : 'MANUAL';
                document.getElementById('metric-mode').textContent = this.state.mode;
                document.querySelector('.toggle-btn').textContent =
                    this.state.mode === 'MANUAL' ? 'SWITCH TO AI' : 'SWITCH TO MANUAL';
                this.send(`mode:${this.state.mode}`);
            },

            draw(data) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                if (!data.lock) return;
                const x = data.x * (this.canvas.width / 320);
                const y = data.y * (this.canvas.height / 240);
                this.ctx.strokeStyle = '#ff0000';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.arc(x, y, 15, 0, Math.PI * 2);
                this.ctx.moveTo(x - 25, y); this.ctx.lineTo(x + 25, y);
                this.ctx.moveTo(x, y - 25); this.ctx.lineTo(x, y + 25);
                this.ctx.stroke();
            },

            renderLoop() {
                if (this.state.latestData) {
                    this.draw(this.state.latestData);
                }
                requestAnimationFrame(() => this.renderLoop());
            }
        };
        App.init();
    </script>
</body>

</html>
