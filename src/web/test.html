    <title>Void Sentry</title>
    <style>
        :root {
            /* Colors */
            --bg: #0a0a0a;
            --panel: #161616;
            --accent: #ff6b00;
            --text: #e0e0e0;
            --terminal: #00ff41;
            --error: #ff3e3e;
            --border: #333;

            /* Spacing & Effects */
            --radius: 4px;
            --pad-sm: 8px;
            --pad-md: 15px;
            --gap-main: 10px;
            --glow: 0 0 10px rgba(255, 107, 0, 0.3);
        }

        /* --- Reset & Base --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header Section --- */
        .header-brand {
            display: flex;
            align-items: center;
            /* Changed: Fixed height ensures a consistent "HUD" bar look */
            height: 64px;
            padding: 0 20px;
            background: linear-gradient(90deg, #1a1a1a, #0a0a0a);
            border-bottom: 1px solid var(--accent);
            box-shadow: var(--glow);
            overflow: hidden;
            /* Safety kill-switch for any stray pixels */
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            margin: 0;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .logo-brand-img {
            height: 75%;
            width: auto;
            flex-shrink: 0;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        .header-actions button {
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            padding: 4px;
            transition: transform 0.2s;
        }

        .header-actions button:hover {
            opacity: 0.8;
        }

        .header-actions svg {
            fill: var(--accent);
            width: 100%;
            height: 100%;
        }

        /* --- Dashboard Layout --- */
        .dashboard {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 280px;
            grid-template-rows: 1fr auto;
            gap: var(--gap-main);
            padding: var(--gap-main);
            min-height: 0;
        }

        /* --- Video Box & Canvas --- */
        .video-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            position: relative;
            display: block;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #streamImg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            filter: contrast(1.1) brightness(1.1);
        }

        #overlayCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }

        /* --- UI Panels (Stats & Advanced) --- */
        .ui-panel,
        .stats-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--pad-md);
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: var(--pad-sm);
        }

        .stats-panel h3 {
            margin: 0;
            color: var(--accent);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .stat-line {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 4px;
            border-left: 2px solid var(--border);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-line:hover {
            border-left-color: var(--accent);
            background: rgba(255, 107, 0, 0.05);
        }

        .stat-val {
            color: var(--terminal);
        }

        /* Locked Alert */
        @keyframes pulse-red {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
                text-shadow: 0 0 10px var(--error);
            }

            100% {
                opacity: 1;
            }
        }

        .status-locked {
            color: var(--error) !important;
            animation: pulse-red 1s infinite;
            font-weight: bold;
        }

        /* Locked Alert END*/


        .advanced-stats {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
        }

        .advanced-stats summary {
            cursor: pointer;
            padding: 4px 0;
            outline: none;
        }

        .toggle-btn {
            margin-top: auto;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .toggle-btn:hover {
            background: rgba(255, 107, 0, 0.1);
        }

        .toggle-btn:active {
            background: var(--accent);
            color: #fff;
        }

        /* --- Control Panel (D-Pad & Fire) --- */
        .control-panel {
            grid-column: 1 / -1;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: clamp(15px, 3vw, 25px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(20px, 8vw, 80px);
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 8px;
        }

        .btn {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 1px solid #333;
            border-radius: 6px;
            display: grid;
            place-items: center;
            cursor: pointer;
            position: relative;
            /* Outward shadow for depth, inward shadow for "beveled" edge */
            box-shadow:
                0 4px 0 #000,
                inset 1px 1px 1px rgba(255, 255, 255, 0.05);
            transition: all 0.1s ease;
        }

        .btn:hover {
            border-color: var(--accent);
            box-shadow:
                0 4px 0 #000,
                0 0 10px rgba(255, 107, 0, 0.2),
                inset 1px 1px 1px rgba(255, 255, 255, 0.05);
        }

        .btn.active,
        .btn:active {
            background: var(--accent);
            transform: translateY(3px);
            box-shadow:
                0 1px 0 #000,
                0 0 15px rgba(255, 107, 0, 0.5);
        }

        .btn svg {
            width: 24px;
            fill: #fff;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
        }

        .btn.active svg,
        .btn:active svg {
            opacity: 1;
            transform: scale(1.1);
        }



        /* Assign D-Pad areas */
        .up {
            grid-area: 1 / 2;
        }

        .left {
            grid-area: 2 / 1;
        }

        .right {
            grid-area: 2 / 3;
        }

        .down {
            grid-area: 3 / 2;
        }

        .fire-btn {
            flex: 1;
            max-width: 400px;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, #ff4500, #b00);
            border: 1px solid #ff6b00;
            border-radius: var(--radius);
            box-shadow: 0 6px 0 #600, 0 4px 15px rgba(255, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.1s;
        }

        .fire-btn:active,
        .fire-btn.active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #600;
        }

        .fire-btn:active:not(:disabled),
        .fire-btn.active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #600, 0 0 20px rgba(255, 69, 0, 0.6);
        }

        /* Not locked - Disallow firing*/
        .fire-btn:disabled {
            background: #333;
            color: #666;
            box-shadow: 0 4px 0 #111;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.7;
        }

        /* --- Help Overlay --- */
        .help-overlay {
            display: none;
            position: fixed;
            top: 80px;
            right: 20px;
            width: 300px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--terminal);
            padding: 20px;
            z-index: 1000;
            backdrop-filter: blur(8px);
            border-radius: var(--radius);
        }

        .help-content h2 {
            color: var(--terminal);
            font-size: 0.9rem;
            font-family: 'Orbitron', sans-serif;
            margin-top: 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .close-help,
        kbd {
            background: var(--terminal);
            color: #000;
            padding: 2px 5px;
            border-radius: 2px;
            font-weight: bold;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 800px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                overflow-y: auto;
            }

            .stats-panel {
                order: 2;
            }

            .video-box {
                order: 1;
                height: 300px;
            }

            .control-panel {
                order: 3;
                flex-direction: column;
                gap: 20px;
            }

            .fire-btn {
                width: 100%;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>

        <h1 onclick="window.location.reload();" style="cursor: pointer;">Void Sentry</h1>
        <div class="header-actions" style="margin-left: auto; display: flex; gap: 15px;">
            <button class="help-btn" onclick="App.toggleHelp()" title="System Help">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z" />
                </svg>
            </button>
            <button class="fullscreen-btn" onclick="App.toggleFullScreen()" title="Toggle Fullscreen">
                <svg viewBox="0 0 24 24">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                </svg>
            </button>
        </div>
    </div>

    <div id="helpModal" class="help-overlay">
        <div class="help-content">
            <h2>COMMAND_LEGEND.txt</h2>
            <div class="shortcut-list">
                <div class="shortcut-item"><span>MOVE SENTRY</span> <span><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd>
                        <kbd>D</kbd></span></div>
                <div class="shortcut-item"><span>ENGAGE FIRE</span> <span><kbd>SPACE</kbd></span></div>
                <div class="shortcut-item"><span>TOGGLE MODE</span> <span><kbd>M</kbd></span></div>
                <div class="shortcut-item"><span>FULLSCREEN</span> <span><kbd>F</kbd></span></div>
                <div class="shortcut-item"><span>SYSTEM HELP</span> <span><kbd>?</kbd></span></div>
                <div class="shortcut-item"><span>CLOSE HELP</span> <span><kbd>ESC</kbd></span></div>
            </div>
            <button class="close-help" onclick="App.toggleHelp()">CLOSE HELP</button>
        </div>
    </div>

    <div class="dashboard">
        <main class="video-box">
            <img id="streamImg" src="/stream">
            <canvas id="overlayCanvas"></canvas>
        </main>

        <aside class="stats-panel">
            <h3>Telemetry</h3>
            <div class="stat-line">SYSTEM <span class="stat-val" id="metric-sys">LINKING...</span></div>
            <div class="stat-line">MODE <span class="stat-val" id="metric-mode">AI</span></div>
            <div class="stat-line">TARGET <span class="stat-val" id="metric-lock">CLEAR</span></div>
            <div class="stat-line">COORD <span class="stat-val" id="metric-pos">0,0</span></div>

            <details class="advanced-stats">
                <summary>ADVANCED</summary>
                <div class="stat-line">FPS <span class="stat-val" id="metric-fps">0</span></div>
                <div class="stat-line">CONF <span class="stat-val" id="metric-conf">0%</span></div>
                <div class="stat-line">RAM <span class="stat-val" id="metric-mem">0 KB</span></div>
            </details>

            <button class="toggle-btn" onclick="App.toggleMode()">SWITCH TO MANUAL</button>
        </aside>

        <section class="control-panel">
            <div class="d-pad">
                <div class="btn up" data-dir="up">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M11.375 6.22l-5 4a1 1 0 0 0 -.375 .78v6l.006 .112a1 1 0 0 0 1.619 .669l4.375 -3.501l4.375 3.5a1 1 0 0 0 1.625 -.78v-6a1 1 0 0 0 -.375 -.78l-5 -4a1 1 0 0 0 -1.25 0z" />
                    </svg>
                </div>

                <div class="btn left" data-dir="left">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="transform: rotate(-90deg);">
                        <path
                            d="M11.375 6.22l-5 4a1 1 0 0 0 -.375 .78v6l.006 .112a1 1 0 0 0 1.619 .669l4.375 -3.501l4.375 3.5a1 1 0 0 0 1.625 -.78v-6a1 1 0 0 0 -.375 -.78l-5 -4a1 1 0 0 0 -1.25 0z" />
                    </svg>
                </div>

                <div class="btn right" data-dir="right">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="transform: rotate(90deg);">
                        <path
                            d="M11.375 6.22l-5 4a1 1 0 0 0 -.375 .78v6l.006 .112a1 1 0 0 0 1.619 .669l4.375 -3.501l4.375 3.5a1 1 0 0 0 1.625 -.78v-6a1 1 0 0 0 -.375 -.78l-5 -4a1 1 0 0 0 -1.25 0z" />
                    </svg>
                </div>

                <div class="btn down" data-dir="down">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="transform: rotate(180deg);">
                        <path
                            d="M11.375 6.22l-5 4a1 1 0 0 0 -.375 .78v6l.006 .112a1 1 0 0 0 1.619 .669l4.375 -3.501l4.375 3.5a1 1 0 0 0 1.625 -.78v-6a1 1 0 0 0 -.375 -.78l-5 -4a1 1 0 0 0 -1.25 0z" />
                    </svg>
                </div>
            </div>

            <button class="fire-btn" onmousedown="App.fire(true)" onmouseup="App.fire(false)"
                ontouchstart="App.fire(true)" ontouchend="App.fire(false)">Engage Fire</button>
        </section>

        <script>
            const App = {
                state: {
                    socket: null,
                    mode: 'AI',
                    activeKeys: new Set(),
                    latestData: null
                },

                init() {
                    this.canvas = document.getElementById('overlayCanvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.img = document.getElementById('streamImg');
                    this.img.onload = () => this.resize();
                    window.onresize = () => this.resize();

                    this.elements = {
                        pos: document.getElementById('metric-pos'),
                        fps: document.getElementById('metric-fps'),
                        lock: document.getElementById('metric-lock'),
                        mode: document.getElementById('metric-mode'),
                        fireBtn: document.querySelector('.fire-btn'),
                        toggleBtn: document.querySelector('.toggle-btn')
                    };

                    this.setupControls();
                    this.setupKeyboard();
                    this.connect();
                    this.renderLoop();
                },

                toggleFullScreen() {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(err => {
                            console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                        });
                    } else {
                        if (document.exitFullscreen) {
                            document.exitFullscreen();
                        }
                    }
                },

                toggleHelp() {
                    const modal = document.getElementById('helpModal');
                    if (modal.style.display === 'none' || modal.style.display === '') {
                        modal.style.display = 'flex';
                    } else {
                        modal.style.display = 'none';
                    }
                },

                setupKeyboard() {
                    const keyMap = {
                        'w': 'up', 'arrowup': 'up',
                        'a': 'left', 'arrowleft': 'left',
                        's': 'down', 'arrowdown': 'down',
                        'd': 'right', 'arrowright': 'right'
                    };

                    const getAction = (e) => keyMap[e.key.toLowerCase()];

                    window.addEventListener('keydown', (e) => {
                        if (e.repeat) return;

                        // System Controls
                        const lowKey = e.key.toLowerCase();
                        if (lowKey === '?') return this.toggleHelp();
                        if (lowKey === 'escape') {
                            document.getElementById('helpModal').style.display = 'none';
                            return;
                        }
                        if (lowKey === 'f') return this.toggleFullScreen();
                        if (lowKey === 'm') return this.toggleMode();

                        // Movement Controls
                        const dir = getAction(e);
                        if (dir) {
                            this.state.activeKeys.add(lowKey); // Store as lowercase
                            this.send(`move:${dir}`);
                            const btn = document.querySelector(`.${dir}`);
                            if (btn) btn.classList.add('active');
                        }

                        if (e.code === 'Space') {
                            e.preventDefault();
                            this.fire(true);
                            document.querySelector('.fire-btn').classList.add('active');
                        }
                    });

                    window.addEventListener('keyup', (e) => {
                        const lowKey = e.key.toLowerCase();
                        const dir = getAction(e);

                        if (dir) {
                            this.state.activeKeys.delete(lowKey); // Remove lowercase version
                            const btn = document.querySelector(`.${dir}`);
                            if (btn) btn.classList.remove('active');

                            if (this.state.activeKeys.size === 0) {
                                this.send(`move:stop`);
                            }
                        }

                        if (e.code === 'Space') {
                            this.fire(false);
                            document.querySelector('.fire-btn').classList.remove('active');
                        }
                    });
                },

                resize() {
                    const img = this.img;
                    const canvas = this.canvas;

                    // Get the actual displayed dimensions of the image inside the object-fit
                    const displayWidth = img.clientWidth;
                    const displayHeight = img.clientHeight;

                    // To get the 'contained' dimensions, we calculate the ratio
                    const renderRatio = img.naturalWidth / img.naturalHeight;
                    const containerRatio = displayWidth / displayHeight;

                    let actualW, actualH;
                    if (containerRatio > renderRatio) {
                        actualH = displayHeight;
                        actualW = displayHeight * renderRatio;
                    } else {
                        actualW = displayWidth;
                        actualH = displayWidth / renderRatio;
                    }

                    // Set canvas size to match the visible image exactly
                    canvas.width = actualW;
                    canvas.height = actualH;
                    canvas.style.width = actualW + 'px';
                    canvas.style.height = actualH + 'px';
                },

                connect() {
                    const url = `ws://${window.location.host}/ws`;
                    this.state.socket = new WebSocket(url);
                    this.state.socket.onopen = () => this.updateStatus("ONLINE", "#00ff41");
                    this.state.socket.onclose = () => {
                        this.updateStatus("RETRYING", "orange");
                        setTimeout(() => this.connect(), 2000);
                    };
                    this.state.socket.onmessage = (e) => {
                        try {
                            console.log("Data received:", e.data)
                            const data = JSON.parse(e.data);
                            this.handleData(data);
                        } catch (err) { }
                    };
                },

                updateStatus(txt, clr) {
                    const el = document.getElementById('metric-sys');
                    if (el) { el.textContent = txt; el.style.color = clr; }
                },

                handleData(data) {
                    this.state.latestData = data;
                    this.elements.pos.textContent = `${data.x},${data.y}`;

                    const lockEl = document.getElementById('metric-lock');

                    if (data.lock) {
                        lockEl.textContent = "TARGET_ACQUIRED";
                        lockEl.classList.add('status-locked');

                        // ENABLE the button
                        this.elements.fireBtn.disabled = false;
                    } else {
                        lockEl.textContent = "SCANNING...";
                        lockEl.classList.remove('status-locked');

                        // DISABLE the button
                        this.elements.fireBtn.disabled = true;

                        // Safety: If the user was holding fire while the lock was lost, turn it off
                        this.fire(false);
                    }
                    this.draw(data);
                },

                send(msg) {
                    if (this.state.socket?.readyState === 1) this.state.socket.send(msg);
                },

                setupControls() {
                    document.querySelectorAll('.btn').forEach(b => {
                        const d = b.dataset.dir;
                        b.onmousedown = b.ontouchstart = (e) => {
                            e.preventDefault();
                            this.send(`move:${d}`);
                            b.classList.add('active');
                        };
                        b.onmouseup = b.ontouchend = () => {
                            this.send(`move:stop`);
                            b.classList.remove('active');
                        };
                    });
                },

                fire(on) {
                    if (!on || (this.state.latestData && this.state.latestData.lock)) {
                        this.send(on ? "fire:on" : "fire:off");
                    }
                },

                toggleMode() {
                    this.state.mode = this.state.mode === 'MANUAL' ? 'AI' : 'MANUAL';
                    document.getElementById('metric-mode').textContent = this.state.mode;
                    document.querySelector('.toggle-btn').textContent =
                        this.state.mode === 'MANUAL' ? 'SWITCH TO AI' : 'SWITCH TO MANUAL';
                    this.send(`mode:${this.state.mode}`);
                },

                draw(data) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    if (!data.lock) return;
                    const x = data.x * (this.canvas.width / 320);
                    const y = data.y * (this.canvas.height / 240);
                    this.ctx.strokeStyle = '#ff0000';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 15, 0, Math.PI * 2);
                    this.ctx.moveTo(x - 25, y); this.ctx.lineTo(x + 25, y);
                    this.ctx.moveTo(x, y - 25); this.ctx.lineTo(x, y + 25);
                    this.ctx.stroke();
                },

                renderLoop() {
                    if (this.state.latestData) {
                        this.draw(this.state.latestData);
                    }
                    requestAnimationFrame(() => this.renderLoop());
                }
            };
            App.init();
        </script>
</body>
